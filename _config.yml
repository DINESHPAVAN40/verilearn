theme: jekyll-theme-cayman
title: VeriLearn
tagline: Master Verilog Hardware Description Language - Interactive Learning Platform
description: Learn Verilog HDL with real-time compilation, simulation, and interactive guides
url: https://DINESHPAVAN40.github.io/verilearn/
